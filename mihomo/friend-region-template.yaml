    type: select
    interval: 300
    timeout: 3000
    url: "https://www.gstatic.com/generate_204"
    lazy: true
    max-failed-times: 3
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇺🇸 美国
