# 基础配置模块 - 常规设置
# 端口和基础配置
port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
unified-delay: true
secret: 62132
keep-alive-interval: 15
udp-timeout: 300 # 将超时时间延长至 300 秒，减少因瞬时无数据导致的断连

# 锚点定义
rules-domain: &rules-domain 
  type: http
  interval: 86400
  behavior: domain

rules-ip: &rules-ip 
  type: http
  interval: 86400
  behavior: ipcidr

rules-classical: &rules-classical 
  type: http
  interval: 86400
  behavior: classical

dns:
  enable: true
  ipv6: false
  use-hosts: true        # 是否使用配置中的hosts。默认true
  use-system-hosts: true # 是否使用系统hosts。默认true
  cache-algorithm: arc   # lru|arc。默认lru。arc：兼顾‘最近用过的’和‘经常用到的’
  enhanced-mode: fake-ip
  fake-ip-filter-mode: blacklist  # 支持rule|whitelist|blacklist。默认为blacklist
  fake-ip-filter:               # 为其他模式时请参考文档写法
    - "*.lan"
    - "+.lan"
    - "*.local"
    - "+.local"
    - "+.localdomain"
    - "+.ts.net"
    - "+.home.arpa"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "connectivitycheck.gstatic.com"
    - "+.captive.apple.com"
    - "time.*.com"
    - "time.*.gov"
    - "ntp.*.com"
    - "ntp.*.org"
    - "pool.ntp.org"
    - "+.pool.ntp.org"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.market.xiaomi.com"
    - "+.jlu.edu.cn"
  fake-ip-range: 198.18.0.1/16
  default-nameserver:      # 基础DNS服务器，负责解析dns的dns。必须使用ip
    - 223.5.5.5
    - 223.6.6.6

  # dns分流配置
  nameserver-policy:  # 优先级最高。命中以下规则的走nameserver
    "+.ts.net":
      - 100.100.100.100  
    "+.jlu.edu.cn":
      - 10.10.10.10    
  nameserver:        # 没有匹配到任何dns规则，命中MATCH兜底的默认DNS。个人偏好国内dns。
    - https://dns.alidns.com/dns-query 
    - https://doh.pub/dns-query
  fallback:          # 一般使用境外DNS，确保可信
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback-filter:   # fallback明确声明，命中该部分的将使用/优先使用fallback解析结果。
    geoip: true
    geoip-code: CN   # 除了 geoip-code 配置的国家 IP, 其他的 IP 结果会被视为污染
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
  respect-rules: true  # 让dns解析时遵循分流规则。需配置proxy-server-nameserver。等价于在 DNS 上游后写 #RULES
  prefer-h3: false     # 使用respect-rules时，不应开启该设置。
  proxy-server-nameserver:   # 仅用于解析代理节点的DNS，最好设置为国内DNS，避免鸡蛋问题
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:        # 直连时的DNS，当然要用国内DNS
    - 223.5.5.5
    - 223.6.6.6
  direct-nameserver-follow-policy: true

proxy-groups:
  # ----------------------------------------------------------------
  # 🎯 核心入口策略组 
  # ----------------------------------------------------------------
  - name: 🎯 PROXY  
    interval: 300
    timeout: 3000
    url: "https://www.gstatic.com/generate_204"
